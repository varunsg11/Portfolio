# Render blueprint (infrastructure-as-code) for the FastAPI backend.
# In the Render dashboard: New → Blueprint → point at this repo.
# Secrets (sync: false) are entered once in the dashboard, never committed.
services:
  - type: web
    name: portfolio-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: RESEND_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
